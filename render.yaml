services:
  - type: web
    name: stancestream
    env: node
    plan: starter
    buildCommand: |
      npm install
      node setupCacheIndex.js
      node initCache.js
    startCommand: node server.js
    envVars:
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_BASE
        value: "https://api.openai.com/v1"
      - key: OPENAI_MODEL
        value: "gpt-4"
      - key: SIMILARITY_THRESHOLD
        value: "0.85"
      - key: CACHE_TTL
        value: "86400"
      - key: PORT
        value: "3000"
    healthCheckPath: /api/health
    # buildFilter intentionally REMOVED 2026-05-30: prior config excluded src/**
    # which silently skipped Render builds when application code under src/ changed.
    # Default (no buildFilter) triggers a build on every push to the connected branch,
    # which is the safe choice for this small service.
