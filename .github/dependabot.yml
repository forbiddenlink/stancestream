version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    groups:
      patches:
        patterns: ["*"]
        update-types: ["patch", "minor"]
      types:
        patterns: ["@types/*"]
      tooling:
        patterns: ["eslint*", "prettier*", "vitest*", "@vitest/*", "playwright*", "@playwright/*"]
      next-ecosystem:
        patterns: ["next", "@next/*", "react", "react-dom", "@types/react*"]
        update-types: ["minor", "patch"]
    labels: ["dependencies"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      gha:
        patterns: ["*"]
